# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Standard build + test ──────────────────────────────────────────────────
  
  test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # always run all platforms; don't cancel Windows when macOS fails
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]
        toolchain: [stable]
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Update tool chain
        run: |
          rustup update ${{ matrix.toolchain }}
          rustup default ${{ matrix.toolchain }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo test
        # go-lib 0.6.0's scheduler is a process-wide singleton: concurrent
        # `#[go_lib::main]` entries share one scheduler and tag netpoll
        # registrations per invocation, so the integration tests run safely
        # in a single process alongside the unit tests — no per-test process
        # isolation (cargo-nextest) is needed anymore.
        timeout-minutes: 10
        run: cargo test --release -- --nocapture

      - name: cargo doc (no deps, no-run)
        run: cargo doc --no-deps
        
      - name: cargo run --examples
        timeout-minutes: 10
        # bash on all three platforms so the inverted exit-code check below
        # behaves identically (the default Windows shell is pwsh).
        shell: bash
        run: |
          cargo run --release --example client_get
          cargo run --release --example echo_server
          cargo run --release --example hello_server
          cargo run --release --example middleware
          cargo run --release --example routing
          cargo run --release --example static_files
          
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update tool chain
        run: |
          rustup update
          rustup default

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo build
        run: cargo build --all-targets

  coverage:
    name: Coverage
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        toolchain: [ nightly ]
    steps:
      - uses: actions/checkout@v4
      - name: Update tool chain
        run: |
          rustup update ${{ matrix.toolchain }}
          rustup default ${{ matrix.toolchain }}
          rustup component add llvm-tools-preview --toolchain ${{ matrix.toolchain }}
      - name: Install coverage tool
        run: cargo +stable install cargo-llvm-cov --locked
      - name: Test project and generate coverage report
        # go-lib 0.6.0's singleton scheduler makes concurrent `#[go_lib::main]`
        # entries safe within one process, so plain `cargo llvm-cov` (no
        # per-test subprocess isolation via nextest) covers all tests.
        run: cargo llvm-cov --remap-path-prefix --show-missing-lines --branch --lcov --output-path lcov.info
      - name: Publish coverage summary to job summary
        uses: livewing/lcov-job-summary@v1.1.0
        with:
          lcov: lcov.info
      - name: Fail build if coverage below 80%
        uses: bigmeech/gha-simple-coverage@master
        with:
          lcov-file-path: lcov.info
          fail-if-below: 80
