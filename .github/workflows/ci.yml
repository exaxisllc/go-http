# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Standard build + test ──────────────────────────────────────────────────
  
  test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # always run all platforms; don't cancel Windows when macOS fails
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]
        toolchain: [stable]
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Update tool chain
        run: |
          rustup update ${{ matrix.toolchain }}
          rustup default ${{ matrix.toolchain }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: cargo test (unit tests)
        # Run the lib unit tests with plain cargo test — they have no go_lib::run()
        # calls and finish in under 1 second.
        timeout-minutes: 5
        run: cargo test --lib -- --nocapture

      - name: cargo nextest run (integration tests)
        # nextest runs each integration test in its own subprocess.
        # This is required because go_lib's goroutine scheduler is a
        # process-global singleton: background goroutines spawned by one test
        # (e.g. the HTTP server goroutine in listen_and_serve) keep running
        # after go_lib::run() returns, and on Linux/epoll their stale state
        # corrupts the next test's scheduler → SIGSEGV.  Running each test
        # in its own OS process gives each test a clean scheduler instance.
        timeout-minutes: 10
        run: cargo nextest run --test middleware --test server_client

      - name: Print Windows VEH crash file (if present)
        if: runner.os == 'Windows'
        shell: pwsh
        # The VEH writes .\go-lib-crash-veh.txt on crash.  Print it so the
        # diagnostics appear in the CI log even when the test binary exits via
        # TerminateProcess (which may race with pipe drain).
        run: |
          if (Test-Path "go-lib-crash-veh.txt") {
            Write-Host "=== go-lib-crash-veh.txt ==="
            Get-Content "go-lib-crash-veh.txt"
          } else {
            Write-Host "(no crash file — process either did not crash or VEH was not reached)"
          }

      - name: cargo doc (no deps, no-run)
        run: cargo doc --no-deps
        
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update tool chain
        run: |
          rustup update
          rustup default

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo build
        run: cargo build --all-targets

  coverage:
    name: Coverage
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        toolchain: [ nightly ]
    steps:
      - uses: actions/checkout@v4
      - name: Update tool chain
        run: |
          rustup update ${{ matrix.toolchain }}
          rustup default ${{ matrix.toolchain }}
          rustup component add llvm-tools-preview --toolchain ${{ matrix.toolchain }}
      - name: Install coverage tool
        run: cargo +stable install cargo-llvm-cov --locked
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Test project and generate coverage report
        # Use `cargo llvm-cov nextest` so that each test runs in its own
        # subprocess — required because go_lib's goroutine scheduler is a
        # process-global singleton that causes SIGSEGV on Linux/epoll when
        # multiple integration tests share a process.
        run: cargo llvm-cov nextest --remap-path-prefix --show-missing-lines --branch --lcov --output-path lcov.info
      - name: Publish coverage summary to job summary
        uses: livewing/lcov-job-summary@v1.1.0
        with:
          lcov: lcov.info
      - name: Fail build if coverage below 80%
        uses: bigmeech/gha-simple-coverage@master
        with:
          lcov-file-path: lcov.info
          fail-if-below: 80
